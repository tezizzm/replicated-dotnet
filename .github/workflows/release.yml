name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  NUGET_SOURCE: https://api.nuget.org/v3/index.json

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release -p:Version=${{ steps.version.outputs.VERSION }} --no-restore

      - name: Run unit tests
        run: dotnet test Replicated.Tests/Replicated.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Build integration tests (compile check)
        run: dotnet build Replicated.IntegrationTests/Replicated.IntegrationTests.csproj --configuration Release --no-restore

      - name: Check for vulnerable packages
        run: |
          OUTPUT=$(dotnet list package --vulnerable --include-transitive 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable packages detected. The release cannot proceed."
            exit 1
          fi

      - name: Pack
        run: dotnet pack Replicated/Replicated.csproj --configuration Release --no-build --output ./nupkg -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./nupkg/*.nupkg
          retention-days: 7

  publish:
    needs: validate
    runs-on: ubuntu-latest
    # Only publish stable releases (tags without a pre-release suffix, e.g. v1.0.0 not v1.0.0-beta.1)
    if: "!contains(github.ref, '-')"
    permissions:
      contents: write

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: ./nupkg

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Publish to NuGet
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source ${{ env.NUGET_SOURCE }} \
            --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: v${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: ./nupkg/*.nupkg
