name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['8.0', '9.0']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better SourceLink support
      
      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Build
        run: dotnet build --configuration Release --no-restore
      
      - name: Run unit tests
        run: dotnet test Replicated.Tests/Replicated.Tests.csproj --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage
      
      - name: Generate coverage report
        if: matrix.dotnet-version == '9.0'
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool || true
          reportgenerator -reports:"**/coverage.cobertura.xml" -targetdir:"./coverage/report" -reporttypes:"Html;Cobertura;TextSummary"
      
      - name: Upload coverage reports
        if: matrix.dotnet-version == '9.0'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/**/coverage.cobertura.xml
          flags: unit-tests
          name: codecov-umbrella
          fail_ci_if_error: false
      
      - name: Check for vulnerable packages
        run: dotnet list package --vulnerable --include-transitive || true
      
      - name: Format check
        run: |
          dotnet tool install -g dotnet-format || true
          dotnet format --verify-no-changes --verbosity diagnostic || true

  integration-tests:
    runs-on: ubuntu-latest
    # Integration tests require the mock server to be running
    # These are optional and shouldn't fail the build if skipped
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'
      
      - name: Start mock server
        run: |
          cd Replicated.IntegrationTests.MockServer
          dotnet run > /tmp/mock-server.log 2>&1 &
          sleep 5
          curl -k https://localhost:5001/health || true
      
      - name: Trust development certificate
        run: dotnet dev-certs https --trust || true
      
      - name: Run integration tests
        run: dotnet test Replicated.IntegrationTests/Replicated.IntegrationTests.csproj --configuration Release --verbosity normal
      
      - name: Stop mock server
        run: pkill -f "Replicated.IntegrationTests.MockServer" || true

