name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ['8.0', '9.0']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test Replicated.Tests/Replicated.Tests.csproj --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage reports
        if: matrix.dotnet-version == '9.0'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/**/coverage.cobertura.xml
          flags: unit-tests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Check for vulnerable packages
        run: |
          OUTPUT=$(dotnet list package --vulnerable --include-transitive 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable packages detected. Review and update affected packages before merging."
            exit 1
          fi

      - name: Format check
        run: dotnet format --verify-no-changes --verbosity diagnostic

  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build integration tests
        run: dotnet build Replicated.IntegrationTests/Replicated.IntegrationTests.csproj --configuration Release --no-restore

      - name: Run integration tests
        # Tests require a live Replicated in-cluster service. Without one they skip
        # gracefully, so allow test-run failures while keeping the build a hard gate.
        continue-on-error: true
        run: dotnet test Replicated.IntegrationTests/Replicated.IntegrationTests.csproj --configuration Release --no-build --verbosity normal
        env:
          TEST_BASE_URL: ${{ vars.INTEGRATION_TEST_BASE_URL }}
